<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student ID</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">
  <div class="card__inner">

    <!-- FRONT -->
    <div class="card__face card__face--front">
      <img src="logo.png" class="logo">
    </div>

    <!-- BACK -->
    <div class="card__face card__face--back">

      <div class="id-card">

        <h2 class="title">
          Hanlim Arts School 한림연예예술고등학교
        </h2>

        <div class="line"></div>

        <p class="desc">
          This certifies that the person below is a registered student of Hanlim Arts School
        </p>

        <div class="content">
          <img src="pp.jpg" class="photo">

          <div class="info">

            <div class="item">
              <span class="label">Full Name</span>
              <span class="value">ryuka</span>
            </div>

            <div class="item">
              <span class="label">Date of Birth</span>
              <span class="value">2011 / 02 / 08</span>
            </div>

            <div class="item">
              <span class="label">Department</span>
              <span class="value">Broadcasting & Entertainment</span>
            </div>

            <div class="item">
              <span class="label">Year Level</span>
              <span class="value">Year 3</span>
            </div>

          </div>
        </div>

      </div>

    </div>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
